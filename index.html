<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabricpack — Link in Bio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-cyan: #00ffff;
            --accent-purple: #aa00ff;
            --accent-magenta: #ff00aa;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 80%, rgba(170, 0, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(0, 255, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(255, 0, 170, 0.1) 0%, transparent 40%);
            animation: rotate 20s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
            z-index: 1;
        }

        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
            animation: fadeInUp 0.8s ease-out;
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid transparent;
            background: linear-gradient(var(--bg-primary), var(--bg-primary)) padding-box,
                        linear-gradient(135deg, var(--accent-cyan), var(--accent-purple), var(--accent-magenta)) border-box;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2),
                        0 0 80px rgba(170, 0, 255, 0.1);
            transition: all 0.4s ease;
        }

        .avatar:hover {
            transform: scale(1.05) rotate(2deg);
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.4),
                        0 0 100px rgba(170, 0, 255, 0.2),
                        0 0 140px rgba(255, 0, 170, 0.1);
        }

        .username {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 2.5rem;
            color: var(--text-primary);
            margin-bottom: 12px;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            animation: fadeInUp 0.8s ease-out 0.1s both;
            letter-spacing: -0.02em;
        }

        .description {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-weight: 500;
            animation: fadeInUp 0.8s ease-out 0.2s both;
            line-height: 1.6;
        }

        .description span {
            color: var(--accent-cyan);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
        }

        .link-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 24px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.8s ease-out calc(0.3s + var(--index) * 0.1s) both;
        }

        .link-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .link-button:hover::before {
            left: 100%;
        }

        .link-button:hover {
            transform: translateY(-3px) scale(1.02);
            border-color: var(--accent-cyan);
            box-shadow: 0 10px 40px -10px rgba(0, 255, 255, 0.3),
                        0 0 20px rgba(0, 255, 255, 0.1),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .link-button i {
            font-size: 1.3rem;
            transition: transform 0.3s ease;
        }

        .link-button:hover i {
            transform: scale(1.2);
        }

        .link-button.telegram:hover {
            border-color: #0088cc;
            box-shadow: 0 10px 40px -10px rgba(0, 136, 204, 0.4),
                        0 0 20px rgba(0, 136, 204, 0.2);
        }

        .link-button.github:hover {
            border-color: #ffffff;
            box-shadow: 0 10px 40px -10px rgba(255, 255, 255, 0.3),
                        0 0 20px rgba(255, 255, 255, 0.1);
        }

        .link-button.birthday:hover {
            border-color: var(--accent-magenta);
            box-shadow: 0 10px 40px -10px rgba(255, 0, 170, 0.4),
                        0 0 20px rgba(255, 0, 170, 0.2);
        }

        .link-button.contact:hover {
            border-color: var(--accent-purple);
            box-shadow: 0 10px 40px -10px rgba(170, 0, 255, 0.4),
                        0 0 20px rgba(170, 0, 255, 0.2);
        }

        .link-button.static {
            cursor: default;
        }

        .link-button.static:hover {
            transform: translateY(-2px);
        }

        .footer {
            font-size: 0.85rem;
            color: var(--text-secondary);
            opacity: 0.7;
            animation: fadeIn 1s ease-out 0.8s both;
            margin-top: 20px;
        }

        .footer .highlight {
            color: var(--accent-cyan);
            font-weight: 600;
        }

        .footer .stand {
            color: var(--accent-magenta);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 0 0 10px rgba(255, 0, 170, 0.5);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 0.7; }
        }

        .username:hover {
            animation: glitch 0.3s ease-in-out;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 30px rgba(0, 255, 255, 0.3); }
            25% { text-shadow: -2px 0 var(--accent-magenta), 2px 0 var(--accent-cyan); }
            50% { text-shadow: 2px 0 var(--accent-magenta), -2px 0 var(--accent-cyan); }
            75% { text-shadow: -1px 0 var(--accent-purple), 1px 0 var(--accent-cyan); }
        }

        @media (max-width: 480px) {
            .username {
                font-size: 2rem;
            }
            
            .description {
                font-size: 1rem;
            }
            
            .avatar {
                width: 120px;
                height: 120px;
            }
            
            .link-button {
                padding: 16px 20px;
            }
        }

        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: var(--accent-cyan);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: particleFloat 1s ease-out forwards;
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        @keyframes particleFloat {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar-wrapper">
            <img src="mcfp.jpg" alt="Fabricpack Avatar" class="avatar">
        </div>
        
        <h1 class="username">Fabricpack</h1>
        
        <p class="description">
            <span>программист хуев</span>, Майнкрафтер, террарианец
        </p>
        
        <div class="links-container">
            <a href="https://t.me/FabricPack" target="_blank" rel="noopener noreferrer" class="link-button telegram" style="--index: 0;">
                <i class="fa-brands fa-telegram"></i>
                <span>Telegram</span>
            </a>
            
            <a href="https://github.com/fabricpack" target="_blank" rel="noopener noreferrer" class="link-button github" style="--index: 1;">
                <i class="fa-brands fa-github"></i>
                <span>GitHub</span>
            </a>
            
            <div class="link-button birthday static" style="--index: 2;">
                <i class="fa-solid fa-birthday-cake"></i>
                <span>12.09.????</span>
            </div>
            
            <a href="https://t.me/FabricPack" target="_blank" rel="noopener noreferrer" class="link-button contact" style="--index: 3;">
                <i class="fa-solid fa-envelope"></i>
                <span>Связаться</span>
            </a>
        </div>
        
        <footer class="footer">
            © 2026 <span class="highlight">Fabricpack</span> | Made with <span class="stand">ZA WARUDO</span> and <i class="fa-solid fa-mug-hot"></i>
        </footer>
    </div>

    <script>
        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.9) {
                createParticle(e.clientX, e.clientY);
            }
        });

        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const angle = Math.random() * Math.PI * 2;
            const velocity = 50 + Math.random() * 100;
            const tx = Math.cos(angle) * velocity;
            const ty = Math.sin(angle) * velocity;
            
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            particle.style.setProperty('--tx', tx + 'px');
            particle.style.setProperty('--ty', ty + 'px');
            
            const colors = ['#00ffff', '#aa00ff', '#ff00aa'];
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            particle.style.boxShadow = `0 0 10px ${particle.style.background}`;
            
            document.body.appendChild(particle);
            
            setTimeout(() => particle.remove(), 1000);
        }

        window.addEventListener('load', () => {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s ease';
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 100);
        });

        const avatar = document.querySelector('.avatar');
        const avatarWrapper = document.querySelector('.avatar-wrapper');
        
        avatarWrapper.addEventListener('mousemove', (e) => {
            const rect = avatarWrapper.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            
            const rotateX = (y / rect.height) * -20;
            const rotateY = (x / rect.width) * 20;
            
            avatar.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
        });
        
        avatarWrapper.addEventListener('mouseleave', () => {
            avatar.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)';
        });
    </script>
</body>
</html>
